workflows:
  ios-workflow:
    name: Posly iOS Derleme
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Bağımlılıkları Yükle
        script: |
          npm install

      - name: Capacitor Sync
        script: |
          npx cap sync ios

      - name: CocoaPods Yükle
        script: |
          cd ios/App
          pod install --repo-update

      - name: Derleme Öncesi Kontrol
        script: |
          echo "=== www/ dosya sayısı ==="
          find www -type f | wc -l
          echo "=== ios/App/App/public/ dosya sayısı ==="
          find ios/App/App/public -type f | wc -l
          echo "=== ios/App/Pods/ var mı? ==="
          ls -la ios/App/Pods/ | head -10
          echo "=== Workspace içeriği ==="
          ls -la ios/App/App.xcworkspace/

      - name: Gerçek Cihaz İçin Derle (İmzasız)
        script: |
          set -e
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_ENTITLEMENTS="" \
            ONLY_ACTIVE_ARCH=NO \
            clean build \
            BUILD_DIR=$CM_BUILD_DIR/build_output \
            | tee build_log.txt

      - name: IPA Oluştur
        script: |
          set +e
          echo "=== Build output kontrol ==="
          APP_PATH=$(find $CM_BUILD_DIR/build_output -name "*.app" -type d | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "HATA: App.app bulunamadı! DerivedData'da arıyorum..."
            APP_PATH=$(find $HOME/Library/Developer/Xcode/DerivedData -name "*.app" -path "*/Release-iphoneos/*" -type d | head -1)
          fi
          
          if [ -z "$APP_PATH" ]; then
            echo "HATA: App.app hiçbir yerde bulunamadı! Klasörü tarıyoruz:"
            ls -laR $CM_BUILD_DIR/build_output || true
            exit 1
          fi
          
          echo "App.app bulundu: $APP_PATH"
          mkdir -p ipa_output/Payload
          cp -r "$APP_PATH" ipa_output/Payload/
          
          cd ipa_output
          zip -q -r ../Posly.ipa Payload

          echo "=== IPA boyutu ==="
          ls -lh ../Posly.ipa

    artifacts:
      - Posly.ipa
      - build_log.txt
