workflows:
  ios-workflow:
    name: Posly iOS Derleme
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Bağımlılıkları Yükle
        script: |
          npm install

      - name: Capacitor Sync
        script: |
          npx cap sync ios

      - name: CocoaPods Yükle
        script: |
          cd ios/App
          pod install --repo-update

      - name: Derleme Öncesi Kontrol
        script: |
          echo "=== www/ dosya sayısı ==="
          find www -type f | wc -l
          echo "=== ios/App/App/public/ dosya sayısı ==="
          find ios/App/App/public -type f | wc -l
          echo "=== ios/App/Pods/ var mı? ==="
          ls -la ios/App/Pods/ | head -10
          echo "=== Workspace içeriği ==="
          ls -la ios/App/App.xcworkspace/

      - name: Gerçek Cihaz İçin Derle ve İmzala
        script: |
          set -e
          
          # Info.plist dosyasında uygulamanın görünen adını (CFBundleDisplayName) güncelliyoruz.
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName Posly Yeni Nesil Pos" ios/App/App/Info.plist || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string Posly Yeni Nesil Pos" ios/App/App/Info.plist

          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App" \
            --config "Release" \
            --archive-flags="-destination 'generic/platform=iOS'"

          
          if [ -z "$APP_PATH" ]; then
            echo "HATA: App.app hiçbir yerde bulunamadı!"
            exit 1
          fi
          
          echo "App.app bulundu: $APP_PATH"
          echo "App.app boyutu:"
          du -sh "$APP_PATH"
          
          echo "App.app içeriği:"
          ls -la "$APP_PATH/"
          
          mkdir -p ipa_output/Payload
          cp -r "$APP_PATH" ipa_output/Payload/
          
          cd ipa_output
          zip -q -r ../Posly.ipa Payload
          
          echo "=== IPA boyutu ==="
          ls -lh ../Posly.ipa

    artifacts:
      - Posly.ipa
      - build_log.txt
