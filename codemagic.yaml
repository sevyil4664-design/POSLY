workflows:
  ios-workflow:
    name: Posly iOS Derleme
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Bağımlılıkları Yükle
        script: npm install
      - name: Capacitor Senkronizasyonu
        script: npx cap sync ios
      - name: IPA Oluştur
        script: |
          xcodebuild build -workspace ios/App/App.xcworkspace -scheme App -configuration Release -sdk iphoneos -allowProvisioningUpdates CODE_SIGNING_ALLOWED=NO
          # IPA paketleme adımları
          mkdir -p build/ios/ipa
          cd build/ios/ipa
          mkdir Payload
          cp -r $HOME/Library/Developer/Xcode/DerivedData/**/Build/Products/Release-iphoneos/App.app Payload
          zip -r Posly.ipa Payload
    artifacts:
      - build/ios/ipa/Posly.ipa
